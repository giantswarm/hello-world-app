{{- if .Values.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "important-service.fullname" . }}
  labels:
    {{- include "important-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "important-service.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
    interval: 60s
{{- end }}
